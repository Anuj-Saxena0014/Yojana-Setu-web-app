<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background: deep saffron-navy split, official Indian gov feel -->
  <rect width="32" height="32" rx="6" fill="#0F2C5E"/>

  <!-- Bridge arc — "Setu" means bridge. Subtle arch at bottom center -->
  <path d="M6 26 Q16 16 26 26" fill="none" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>

  <!-- Person silhouette (beneficiary citizen) -->
  <!-- Head -->
  <circle cx="12" cy="11" r="3" fill="#FFFFFF"/>
  <!-- Body -->
  <path d="M9 20 Q9 15 12 15 Q15 15 15 20" fill="#FFFFFF"/>

  <!-- Search / AI match symbol — magnifier overlapping person, bridging citizen to scheme -->
  <circle cx="20" cy="13" r="4.5" fill="none" stroke="#F5A623" stroke-width="2"/>
  <line x1="23.2" y1="16.2" x2="26" y2="19" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>

  <!-- Tick inside magnifier — "match found" -->
  <path d="M18 13 L19.5 14.5 L22.5 11.5" fill="none" stroke="#4CAF50" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
